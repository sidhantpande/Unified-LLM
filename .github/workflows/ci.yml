name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[test]"
      - name: Pytest
        env:
          ABSTRACTCORE_RUN_LOCAL_PROVIDER_TESTS: "0"
          ABSTRACTCORE_RUN_LIVE_API_TESTS: "0"
          ABSTRACTCORE_RUN_MLX_TESTS: "0"
          ABSTRACTCORE_RUN_HUGGINGFACE_TESTS: "0"
        run: python -m pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build
        run: |
          python -m pip install -U pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[docs]"
      - name: MkDocs build
        run: mkdocs build -q
