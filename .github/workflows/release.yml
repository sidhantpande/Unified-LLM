name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[test]"
      - name: Pytest
        env:
          ABSTRACTCORE_RUN_LOCAL_PROVIDER_TESTS: "0"
          ABSTRACTCORE_RUN_LIVE_API_TESTS: "0"
          ABSTRACTCORE_RUN_MLX_TESTS: "0"
          ABSTRACTCORE_RUN_HUGGINGFACE_TESTS: "0"
          ABSTRACTCORE_TEST_HERMETIC_MODEL_DISCOVERY: "1"
        run: python -m pytest

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[docs]"
      - name: MkDocs build
        run: mkdocs build -q

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [test, docs]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install build twine
      - name: Validate tag, version, and changelog
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag[1:] if tag.startswith("v") else tag

          version_text = Path("abstractcore/utils/version.py").read_text()
          version_match = re.search(r'__version__\s*=\s*"([^"]+)"', version_text)
          if not version_match:
              raise SystemExit("Could not find __version__ in abstractcore/utils/version.py")
          package_version = version_match.group(1)
          if version != package_version:
              raise SystemExit(
                  f"Tag version {version!r} does not match package version {package_version!r}"
              )

          changelog = Path("CHANGELOG.md").read_text()
          header = re.search(rf"^## \[{re.escape(version)}\] - .+$", changelog, re.MULTILINE)
          if not header:
              raise SystemExit(f"CHANGELOG.md has no entry for {version}")

          rest = changelog[header.end():]
          next_header = re.search(r"^## \[", rest, re.MULTILINE)
          notes = rest[: next_header.start() if next_header else len(rest)].strip()
          if not notes:
              raise SystemExit(f"CHANGELOG.md entry for {version} is empty")

          Path("release-notes.md").write_text(notes + "\n")
          PY
      - name: Build
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/abstractcore/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .
      - uses: softprops/action-gh-release@v2
        with:
          name: AbstractCore ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
